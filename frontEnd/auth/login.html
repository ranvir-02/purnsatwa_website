<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>PURNASATWA Login</title>
    <link rel="stylesheet"
          href="css/login.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <video class="bg-video"
           autoplay
           muted
           loop
           playsinline>

        <source src="video/bg-video.mp4"
                type="video/mp4">

    </video>

    <div class="overlay"></div>

    <main class="login-wrapper">

        <div class="brand-header">
            <img src="images/logo.png.jpeg" alt="PURNASATWA logo" class="brand-logo">
            <div class="brand-text">
                <h2>PURNASATWA</h2>
                <p>Pure Dairy, Pure Health</p>
            </div>
        </div>

        <section class="login-card">

            <div class="reflection"></div>

            <form autocomplete="off">

                <div class="heading">

                    <h1>Welcome back</h1>

                    <p>Sign in to your PURNASATWA account</p>

                </div>

                <div class="field">

                    <label>Email address</label>

                    <div class="input-box">

                        <i class="fa-regular fa-envelope"></i>

                        <input type="email" placeholder="you@example.com">

                    </div>

                </div>

                <div class="password-header">

                    <label>Password</label>

                    <a href="#">Forgot password?</a>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input type="password" placeholder="Enter your password">

                    <i class="fa-regular fa-eye eye"></i>

                </div>

                <div class="remember">

                    <label>

                        <input type="checkbox">

                        <span>Remember me</span>

                    </label>

                </div>

                <button type="button" class="login-btn">Sign In</button>

                <div class="divider">

                    <span></span>

                    <p>or</p>

                    <span></span>

                </div>

                <div class="register">

                    Don't have an account?

                    <a href="register.html">Create Account</a>

                </div>

            </form>

        </section>

    </main>

    <footer>

        © 2026 PURNASATWA Dairy Production.
        All rights reserved.

    </footer>

</body>

</html>
